<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WorldTree Play</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#07100c;color:#f7e7b3;font-family:monospace;overflow:hidden}.app{height:100vh;display:grid;grid-template-columns:1fr 340px;grid-template-rows:1fr 156px;gap:10px;padding:10px}.box{background:#102015;border:3px solid #050805;box-shadow:5px 5px #000}canvas{width:100%;height:100%;image-rendering:pixelated;display:block}.side{padding:12px;display:flex;flex-direction:column;gap:10px}.log{flex:1;background:#07100c;border:2px solid #486a40;padding:10px;overflow:auto;line-height:1.45}.hud{grid-column:1/3;display:grid;grid-template-columns:150px 1fr 320px;gap:10px;padding:10px;align-items:center}.portrait{height:132px;background:#07100c;border:2px solid #486a40;display:grid;grid-template-columns:58px 1fr;align-items:center;padding:8px}.face{width:46px;height:70px;image-rendering:pixelated}.stats{display:flex;gap:12px;flex-wrap:wrap}.stats b{color:#ffd76a}.shop{display:grid;grid-template-columns:1fr 1fr;gap:6px}button,a{font:inherit;font-weight:900;background:#315c34;color:#f7e7b3;border:2px solid #050805;box-shadow:3px 3px #000;padding:10px;text-decoration:none;cursor:pointer}.gold{background:#ffd76a;color:#241909}.small{color:#b7c7a5;font-size:12px}@media(max-width:880px){body{overflow:auto}.app{height:auto;min-height:100vh;grid-template-columns:1fr;grid-template-rows:62vh 320px auto}.hud{grid-column:1;grid-template-columns:1fr}.shop{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<main class="box"><canvas id="cv" width="960" height="620"></canvas></main>
<aside class="box side"><a href="index.html">Portal</a><h2>원정 로그</h2><div class="small">타일을 클릭해 이동. 행동력이 원정 반경입니다.</div><div id="log" class="log"></div><button id="reset">초기화</button></aside>
<footer class="box hud"><div class="portrait"><canvas id="avatar" class="face" width="46" height="70"></canvas><div><b id="rank">새싹 모험가</b><br><span id="gear" class="small">나무검 · 천 갑옷</span></div></div><div class="stats"><span>AP <b id="ap">0</b>/<b id="maxAp">0</b></span><span>Wood <b id="wood">0</b></span><span>Gold <b id="gold">0</b></span><span>Power <b id="power">0</b></span><span>RP <b id="rp">0</b></span><span>Tree <b id="treeLv">1</b></span><span>Best <b id="best">0</b>m</span></div><div class="shop"><button class="gold" id="home">귀환</button><button id="upAp">AP 강화</button><button id="upPow">Power 강화</button><button id="upTree">세계수 성장</button></div></footer>
</div>
<script>
const cv=document.getElementById('cv'),c=cv.getContext('2d'),av=document.getElementById('avatar').getContext('2d'),$=id=>document.getElementById(id);let S=JSON.parse(localStorage.wtPlay||'null')||{x:0,y:0,ap:50,maxAp:50,wood:0,gold:0,power:10,rp:0,best:0,treeLv:1,apLv:0,powLv:0,seen:{}};const pts=[[-8,-5,'forest'],[7,-7,'cave'],[11,2,'camp'],[-12,4,'camp'],[-4,9,'chest'],[2,-12,'snow'],[10,9,'ruin'],[-14,-8,'mine'],[13,-5,'town']];function log(t){$('log').innerHTML='<div>· '+t+'</div>'+$('log').innerHTML}function save(){localStorage.wtPlay=JSON.stringify(S)}function col(t){return{grass:'#2f6b38',forest:'#184f28',cave:'#2a2b30',camp:'#7a3b18',chest:'#9c6b23',snow:'#9fd4df',ruin:'#55504a',mine:'#3d4d75',town:'#6b5430'}[t]||'#2f6b38'}function drawTile(cx,cy,t){c.fillStyle=col(t);c.fillRect(cx-18,cy-10,36,20);c.strokeStyle='#0b160d';c.strokeRect(cx-18,cy-10,36,20)}function iso(x,y){return[480+(x-y)*22,310+(x+y)*11]}function terrain(x,y){let p=pts.find(q=>q[0]==x&&q[1]==y);if(p)return p[2];let d=Math.hypot(x,y);if(d<3)return'grass';if((x+y)%7==0)return'forest';if(d>13)return'snow';return'grass'}function drawTree(cx,cy){c.fillStyle='#4b2a14';c.fillRect(cx-8,cy-46,16,42);c.fillStyle='#55d66b';for(let i=0;i<4;i++)c.fillRect(cx-38+i*10,cy-72+i*4,76-i*20,20)}function drawPiece(cx,cy){let t=S.rp>=25?3:S.rp>=8?2:1;c.fillStyle=t==3?'#83c7ff':t==2?'#ffd76a':'#95ff9d';c.fillRect(cx-8,cy-28,16,22);c.fillRect(cx-12,cy-12,24,10);c.fillStyle='#07100c';c.fillRect(cx-4,cy-23,3,3);c.fillRect(cx+3,cy-23,3,3)}function render(){c.clearRect(0,0,960,620);c.fillStyle='#07100c';c.fillRect(0,0,960,620);c.fillStyle='#13221a';c.fillRect(0,0,960,620);for(let y=-15;y<=15;y++)for(let x=-15;x<=15;x++){let d=Math.hypot(x,y);if(d>16)continue;let [sx,sy]=iso(x,y);drawTile(sx,sy,terrain(x,y))}let [tx,ty]=iso(0,0);drawTree(tx,ty);pts.forEach(p=>{let [sx,sy]=iso(p[0],p[1]);c.fillStyle='#ffd76a';c.fillRect(sx-5,sy-31,10,10);c.fillStyle='#000';c.fillText(p[2],sx-18,sy-36)});let [px,py]=iso(S.x,S.y);drawPiece(px,py);c.fillStyle='#f7e7b3';c.font='20px monospace';c.fillText('WorldTree Expedition',20,34);c.font='14px monospace';c.fillText('click tile / spend AP / return / grow HUD',20,56);drawAvatar();ui()}function drawAvatar(){av.clearRect(0,0,46,70);let t=S.rp>=25?3:S.rp>=8?2:1;av.fillStyle=t==3?'#83c7ff':t==2?'#ffd76a':'#95ff9d';av.fillRect(16,8,16,14);av.fillRect(10,24,28,34);av.fillStyle='#21140a';av.fillRect(19,13,3,3);av.fillRect(26,13,3,3);av.fillStyle=t==3?'#dff3ff':t==2?'#d9a441':'#6a3d20';av.fillRect(8,22,30,6);av.fillStyle='#cfcfcf';av.fillRect(34,28,4,26)}function ui(){['ap','maxAp','wood','gold','power','rp','treeLv','best'].forEach(k=>$(k).textContent=S[k]);let t=S.rp>=25?3:S.rp>=8?2:1;$('rank').textContent=t==3?'세계수 기사':t==2?'숙련 모험가':'새싹 모험가';$('gear').textContent=t==3?'빛검 · 잎망토':t==2?'강철검 · 가죽갑옷':'나무검 · 천갑옷';save()}function act(kind,d){if(kind=='forest'){let v=4+S.treeLv+Math.floor(d/5);S.wood+=v;log('Wood +'+v)}else if(kind=='cave'){let v=18+S.treeLv*3;S.gold+=v;log('동굴 Gold +'+v)}else if(kind=='camp'){let need=12+d;if(S.power>=need){S.gold+=35;S.power+=1;log('불빛 지역 통과 Gold +35')}else log('Power '+need+' 필요')}else if(kind=='chest'){S.rp+=2;log('상자 RP +2')}else if(kind=='mine'){S.wood+=6;S.gold+=14;log('광맥 채집')}else if(kind=='town'){S.ap=Math.min(S.maxAp,S.ap+10);log('마을 휴식 AP +10')}else log('정찰 완료')}function move(x,y){let cost=Math.max(1,Math.ceil(Math.hypot(x-S.x,y-S.y)));if(S.ap<cost){log('AP 부족');return}S.ap-=cost;S.x=x;S.y=y;let d=Math.round(Math.hypot(x,y)*6);S.best=Math.max(S.best,d);act(terrain(x,y),d);render()}cv.onclick=e=>{let r=cv.getBoundingClientRect(),mx=(e.clientX-r.left)*960/r.width,my=(e.clientY-r.top)*620/r.height,b=null,bd=999;for(let y=-15;y<=15;y++)for(let x=-15;x<=15;x++){let [sx,sy]=iso(x,y),dd=Math.hypot(mx-sx,my-sy);if(dd<bd){bd=dd;b=[x,y]}}if(b&&bd<28)move(b[0],b[1])};function ret(){let g=Math.floor(S.best/20)+Math.floor(S.wood/25)+Math.floor(S.gold/60);S.rp+=g;S.x=0;S.y=0;S.ap=S.maxAp;S.best=0;S.wood=0;S.gold=0;log('귀환 RP +'+g);render()}function up(k){let cost=k=='tree'?8+S.treeLv*2:5+(k=='ap'?S.apLv:S.powLv)*3;if(S.rp<cost){log('RP 부족 '+cost);return}S.rp-=cost;if(k=='ap'){S.apLv++;S.maxAp+=10;S.ap=S.maxAp;log('AP 강화')}if(k=='pow'){S.powLv++;S.power+=6;log('Power 강화')}if(k=='tree'){S.treeLv++;S.maxAp+=3;S.power+=2;log('세계수 성장')}render()}$('home').onclick=ret;$('upAp').onclick=()=>up('ap');$('upPow').onclick=()=>up('pow');$('upTree').onclick=()=>up('tree');$('reset').onclick=()=>{localStorage.removeItem('wtPlay');location.reload()};log('원정 시작');render();
</script>
</body>
</html>
