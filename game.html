<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>WorldTree — Game MVP</title>
<style>
:root{--bg:#07100c;--panel:#111f17;--line:#4d6b46;--gold:#ffd76a;--leaf:#75ff90;--text:#fff5d2;--muted:#b9c8a8}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 50% 18%,#284a34,#07100c 62%);color:var(--text);font-family:ui-monospace,Menlo,Consolas,monospace;overflow:hidden}.app{height:100vh;display:grid;grid-template-columns:1fr 360px;grid-template-rows:1fr 136px;gap:10px;padding:10px}.game,.room,.hud,.modal{border:3px solid #030603;background:rgba(17,31,23,.95);box-shadow:5px 5px 0 #000}.game{position:relative;overflow:hidden}.sky{position:absolute;inset:0;background:radial-gradient(circle at 50% 34%,#476a8b 0 18%,#1d3146 43%,#080d12 74%)}.stars{position:absolute;inset:0;background-image:radial-gradient(#fff8 1px,transparent 1px);background-size:37px 41px;opacity:.28}.title{position:absolute;z-index:6;left:16px;top:12px;text-shadow:3px 3px #000}.title b{font-size:26px;color:var(--gold)}.toplink{position:absolute;right:16px;top:14px;z-index:8;color:var(--gold);text-decoration:none;background:#08100b;border:2px solid var(--line);padding:8px}.world-wrap{position:absolute;inset:36px 8px 0;display:grid;place-items:center;perspective:900px}.world{position:relative;width:min(92vmin,880px);height:min(60vmin,560px);border-radius:50% 50% 42% 42%;transform:rotateX(52deg);transform-origin:center 64%;background:radial-gradient(ellipse at center,#244b2d 0 9%,#1d3e27 10% 31%,#24381f 32% 52%,#2d2b20 53% 71%,#1d2d31 72% 100%);border:5px solid #050807;box-shadow:inset 0 0 70px #000b,0 28px 60px #000c;overflow:hidden}.world:before{content:"";position:absolute;inset:-20%;background:linear-gradient(90deg,transparent 0 48%,#ffffff12 49% 51%,transparent 52%),linear-gradient(0deg,transparent 0 48%,#ffffff12 49% 51%,transparent 52%);background-size:42px 42px;opacity:.9}.world:after{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 0 46%,#0006 80%)}.tree{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) rotateX(-52deg);font-size:74px;z-index:5;filter:drop-shadow(0 0 20px var(--leaf))}.piece{position:absolute;width:24px;height:30px;left:50%;top:50%;transform:translate(-50%,-50%) rotateX(-52deg);z-index:7;background:linear-gradient(#caffd0,#4de56d);border:3px solid #061006;border-radius:50% 50% 35% 35%;box-shadow:0 0 18px #80ff91;transition:.16s linear}.poi{position:absolute;z-index:4;transform:translate(-50%,-50%) rotateX(-52deg);font-size:25px;text-shadow:3px 3px #000;cursor:pointer}.poi:hover{scale:1.18}.fire{filter:drop-shadow(0 0 13px #ffb23b);animation:flicker .9s infinite alternate}@keyframes flicker{from{opacity:.72}to{opacity:1;scale:1.08}}.room{display:flex;flex-direction:column;min-width:0}.room h2{margin:12px 12px 6px;color:var(--gold);font-size:18px}.avatars{display:flex;gap:8px;padding:0 10px 8px;overflow:hidden}.avatar{width:78px;min-width:78px;height:94px;background:#0b130e;border:2px solid var(--line);display:grid;place-items:center;text-align:center}.face{font-size:38px}.name{font-size:11px;color:var(--muted)}.log{flex:1;margin:0 10px 10px;padding:10px;background:#08100b;border:2px solid var(--line);overflow:auto;font-size:13px;line-height:1.45}.msg{margin-bottom:8px}.me{color:var(--leaf)}.sera{color:var(--gold)}.input{display:flex;gap:6px;padding:0 10px 10px}.input input{flex:1;background:#08100b;color:var(--text);border:2px solid var(--line);padding:10px;font:inherit}.input button,.btn{background:#2e5735;color:var(--text);border:2px solid #030603;padding:10px 12px;font:inherit;font-weight:900;cursor:pointer;box-shadow:3px 3px #000}.btn:hover,.input button:hover{transform:translate(1px,1px);box-shadow:1px 1px #000}.hud{grid-column:1/3;display:grid;grid-template-columns:126px 1fr auto;gap:12px;align-items:center;padding:10px 14px}.portrait{height:108px;background:#08100b;border:2px solid var(--line);display:grid;grid-template-columns:62px 1fr;align-items:center;padding:6px}.hero{font-size:48px;filter:drop-shadow(0 0 8px #fff8)}.eq{font-size:11px;color:var(--muted)}.stat{display:flex;gap:14px;flex-wrap:wrap}.stat b{color:var(--gold)}.actions{display:flex;gap:8px;flex-wrap:wrap}.modal{display:none;position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:30;width:min(760px,calc(100% - 24px));max-height:88vh;overflow:auto;padding:18px}.modal.show{display:block}.modal h2{color:var(--gold);margin:0 0 8px}.rows{display:grid;gap:6px;margin:10px 0}.row{display:flex;justify-content:space-between;border-bottom:1px solid #ffffff22;padding:5px 0}.muted{color:var(--muted)}.inv{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.slot{background:#08100b;border:2px solid var(--line);min-height:92px;padding:10px;cursor:pointer}.slot:hover{outline:2px solid var(--gold)}.ico{font-size:30px}.qty{float:right;color:var(--gold)}@media(max-width:900px){body{overflow:auto}.app{height:auto;min-height:100vh;grid-template-columns:1fr;grid-template-rows:70vh 390px 190px}.hud{grid-column:1;grid-template-columns:1fr}.world{width:110vmin;height:72vmin}.portrait{width:100%}.inv{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="app">
<main class="game"><a class="toplink" href="index.html">Portal</a><div class="sky"></div><div class="stars"></div><div class="title"><b>WORLDTREE</b><br><span id="build">Web MVP v0.2 · Local Save</span></div><div class="world-wrap"><div class="world" id="world"><div class="tree">🌳</div><div class="piece" id="piece"></div></div></div></main>
<aside class="room"><h2>세계수 로비</h2><div class="avatars"><div class="avatar"><div><div class="face" id="avatarFace">🧝</div><div class="name">플레이어</div></div></div><div class="avatar"><div><div class="face">🐰</div><div class="name">세라</div></div></div><div class="avatar"><div><div class="face">🪓</div><div class="name">벌목</div></div></div><div class="avatar"><div><div class="face">⚔️</div><div class="name">강화</div></div></div></div><div class="log" id="log"></div><div class="input"><input id="chatInput" placeholder="로비에 말하기" maxlength="120"><button id="send">전송</button></div></aside>
<footer class="hud"><div class="portrait"><div class="hero" id="heroFace">🧝</div><div><b id="charTitle">새싹 모험가</b><div class="eq" id="equipText">나무검 · 천 갑옷</div></div></div><div class="stat"><span>AP <b id="ap">50</b></span><span>Wood <b id="wood">0</b></span><span>Gold <b id="gold">0</b></span><span>Power <b id="power">10</b></span><span>RP <b id="rp">0</b></span><span>TreeLv <b id="treeLv">1</b></span><span>Best <b id="best">0m</b></span></div><div class="actions"><button class="btn" id="invBtn">인벤토리</button><button class="btn" id="rebirth">귀환/환생</button></div></footer>
</div>
<div class="modal" id="result"><h2>원정 평가</h2><div class="rows" id="resultRows"></div><button class="btn" id="closeResult">확인</button></div>
<div class="modal" id="inventory"><h2>인벤토리</h2><p class="muted">현재는 로컬 MVP 아이템 상태입니다. 슬롯을 누르면 상세 정보가 표시됩니다.</p><div class="inv" id="invGrid"></div><div class="rows" id="itemDetail"></div><button class="btn" id="closeInv">닫기</button></div>
<script>
const $=id=>document.getElementById(id);let s=JSON.parse(localStorage.wtGameMvp||'null')||{ap:50,wood:0,gold:0,power:10,rp:0,x:0,y:0,best:0,run:1,treeLv:1,cave:0,camp:0,chest:0};const pois=[['🌲',-26,-14,'숲'],['🕳️',20,-26,'동굴'],['🔥',35,8,'오크 야영지'],['🔥',-38,18,'고블린 캠프'],['📦',-14,34,'상자'],['❄️',5,-43,'설원'],['⛰️',31,34,'폐허']];function pct(v,a){return a==='x'?50+v:50+v*.72}function save(){localStorage.wtGameMvp=JSON.stringify(s)}function ui(){['ap','wood','gold','power','rp','treeLv'].forEach(k=>$(k).textContent=s[k]);$('best').textContent=s.best+'m';$('piece').style.left=pct(s.x,'x')+'%';$('piece').style.top=pct(s.y,'y')+'%';let tier=s.rp>=20?['🧙','세계수 기사','빛의 검 · 잎망토']:s.rp>=8?['🧝','숙련 모험가','강철검 · 가죽 갑옷']:['🧝','새싹 모험가','나무검 · 천 갑옷'];$('heroFace').textContent=tier[0];$('avatarFace').textContent=tier[0];$('charTitle').textContent=tier[1];$('equipText').textContent=tier[2];save()}function log(w,t){$('log').innerHTML+=`<div class="msg ${w}"><b>${w==='me'?'나':'세라'}:</b> ${t}</div>`;$('log').scrollTop=99999}function eventAt(name,d){if(name==='숲'){let w=4+Math.floor(d/9)+s.treeLv;s.wood+=w;log('sera',`숲 벌목. Wood +${w}`)}else if(name==='동굴'){s.cave++;Math.random()<.42?(s.gold+=25+s.treeLv*3,log('sera','동굴 보물 발견. Gold 획득')):log('sera','동굴은 비어 있습니다.')}else if(name.includes('야영지')||name.includes('캠프')){let need=12+d;if(s.power>=need){s.gold+=30;s.power+=2;s.camp++;log('sera',`${name} 돌파. Gold +30, Power +2`)}else log('sera',`${name} 전투력 부족. 귀환 추천.`)}else if(name==='상자'){s.chest++;Math.random()<.35?(s.rp+=2,log('sera','희귀 상자. RP +2')):log('sera','빈 상자입니다.')}else log('sera',`${name} 정찰 완료.`)}function moveTo(x,y,name){if(s.ap<=0){log('sera','행동력이 없습니다. 귀환하세요.');return}let cost=Math.max(1,Math.ceil(Math.hypot(x-s.x,y-s.y)/7));if(cost>s.ap){log('sera','행동력이 부족합니다.');return}s.ap-=cost;s.x=x;s.y=y;let d=Math.round(Math.hypot(x,y));s.best=Math.max(s.best,d);eventAt(name,d);ui()}function resultModal(gain){$('resultRows').innerHTML=`<div class="row"><span>최고거리</span><b>${s.best}m</b></div><div class="row"><span>Wood</span><b>${s.wood}</b></div><div class="row"><span>Gold</span><b>${s.gold}</b></div><div class="row"><span>동굴</span><b>${s.cave}</b></div><div class="row"><span>캠프</span><b>${s.camp}</b></div><div class="row"><span>상자</span><b>${s.chest}</b></div><div class="row"><span>RP 획득</span><b>+${gain}</b></div><p class="muted">RP가 쌓이면 AP, Power, 캐릭터 등급이 상승합니다.</p>`;$('result').classList.add('show')}function rebirth(){let gain=Math.floor(s.best/8)+Math.floor(s.wood/20)+Math.floor(s.gold/45)+s.cave+s.camp+s.chest;s.rp+=gain;s.treeLv=1+Math.floor(s.rp/12);s.ap=50+Math.floor(s.rp/2);s.power=10+Math.floor(s.rp/2)+s.treeLv;s.wood=0;s.gold=0;s.x=0;s.y=0;s.best=0;s.cave=0;s.camp=0;s.chest=0;s.run++;resultModal(gain);log('sera',`귀환 완료. RP +${gain}. 다음 AP ${s.ap}`);ui()}function invItems(){return[{n:'통나무 묶음',i:'🪵',q:s.wood,d:'벌목으로 얻는 기본 자원. 제작과 강화 재료로 확장 예정.'},{n:'Gold',i:'🪙',q:s.gold,d:'동굴과 전투에서 얻는 기본 화폐.'},{n:'새싹 검',i:'⚔️',q:1,d:'현재 장착 무기. 서버 강화 API 연결 후 레벨 표시 예정.'},{n:'세계수 씨앗',i:'🌱',q:s.treeLv,d:'환생P에 따라 성장하는 계정 진행도.'},{n:'상자 기록',i:'📦',q:s.chest,d:'이번 원정에서 확인한 상자 수.'},{n:'캠프 전리품',i:'🔥',q:s.camp,d:'이번 원정의 전투 돌파 기록.'},{n:'동굴 기록',i:'🕳️',q:s.cave,d:'이번 원정의 동굴 방문 기록.'},{n:'환생P',i:'✦',q:s.rp,d:'귀환 보상. 다음 원정의 기본 능력을 올립니다.'}]}function openInv(){let html='';invItems().forEach((it,k)=>html+=`<div class="slot" onclick="detail(${k})"><span class="qty">x${it.q}</span><div class="ico">${it.i}</div><b>${it.n}</b></div>`);$('invGrid').innerHTML=html;$('itemDetail').innerHTML='<p class="muted">슬롯을 선택하세요.</p>';$('inventory').classList.add('show')}function detail(k){let it=invItems()[k];$('itemDetail').innerHTML=`<div class="row"><span>아이템</span><b>${it.i} ${it.n}</b></div><div class="row"><span>수량</span><b>${it.q}</b></div><p class="muted">${it.d}</p>`}function makeWorld(){pois.forEach(p=>{let e=document.createElement('div');e.className='poi '+(p[0]==='🔥'?'fire':'');e.textContent=p[0];e.title=p[3];e.style.left=pct(p[1],'x')+'%';e.style.top=pct(p[2],'y')+'%';e.addEventListener('click',()=>moveTo(p[1],p[2],p[3]));$('world').appendChild(e)})}$('rebirth').onclick=rebirth;$('closeResult').onclick=()=>$('result').classList.remove('show');$('invBtn').onclick=openInv;$('closeInv').onclick=()=>$('inventory').classList.remove('show');$('send').onclick=()=>{let v=$('chatInput').value.trim();if(!v)return;log('me',v);$('chatInput').value='';setTimeout(()=>log('sera','기록했습니다. 현재는 로컬 로비 MVP입니다.'),140)};$('chatInput').addEventListener('keydown',e=>{if(e.key==='Enter')$('send').click()});makeWorld();log('sera','WorldTree MVP v0.2 시작. 원정하고, 인벤토리를 확인하고, 귀환해 성장하세요.');ui();
</script>
</body>
</html>
