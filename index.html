<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>WorldTree</title>
<style>
body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#284a34,#07100c 65%);color:#fff5d2;font-family:ui-monospace,Menlo,Consolas,monospace}.wrap{max-width:980px;margin:auto;padding:28px}.panel{background:#111f17ee;border:3px solid #030603;box-shadow:6px 6px 0 #000;padding:22px;margin:14px 0}h1{font-size:72px;line-height:.9;margin:18px 0;color:#ffd76a;text-shadow:5px 5px #000}.lead{font-size:18px;line-height:1.6;color:#b9c8a8}.btn{display:inline-block;background:#2e5735;color:#fff5d2;border:2px solid #030603;box-shadow:3px 3px 0 #000;padding:12px 16px;margin:6px 8px 6px 0;text-decoration:none;font-weight:900}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.tree{font-size:92px;filter:drop-shadow(0 0 20px #75ff90)}@media(max-width:760px){.grid{grid-template-columns:1fr}h1{font-size:48px}.wrap{padding:14px}}
</style>
</head>
<body>
<div class="wrap">
  <section class="panel">
    <div class="tree">🌳</div>
    <h1>WorldTree</h1>
    <p class="lead">공식 포털과 바로 실행 가능한 웹게임 MVP입니다. 탐험, 벌목, 성장, 귀환 루프를 먼저 공개하고 이후 서버 데이터와 연결합니다.</p>
    <a class="btn" href="game.html">게임 시작</a>
    <a class="btn" href="#guide">플레이 가이드</a>
  </section>
  <section id="guide" class="grid">
    <article class="panel"><h2>탐험</h2><p>맵의 아이콘을 눌러 행동력을 사용합니다.</p></article>
    <article class="panel"><h2>벌목</h2><p>숲에서 Wood를 얻어 성장 재료로 사용합니다.</p></article>
    <article class="panel"><h2>귀환</h2><p>환생P를 얻고 다음 원정을 강화합니다.</p></article>
  </section>
</div>
</body>
</html>
