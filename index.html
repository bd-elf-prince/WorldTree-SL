<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>WorldTree MVP</title>
<style>
:root{--bg:#0d1611;--panel:#17271d;--line:#38533c;--gold:#ffd66b;--green:#7cff8a;--text:#fff6d7;--muted:#b7c9a8;--tile:34px}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 50% 35%,#24402b,#0d1611 65%);color:var(--text);font-family:ui-monospace,Consolas,monospace;overflow:hidden}.app{height:100vh;display:grid;grid-template-columns:1fr 340px;grid-template-rows:1fr 74px;gap:10px;padding:10px}.game,.chat,.hud{border:3px solid #050805;background:rgba(23,39,29,.92);box-shadow:5px 5px 0 #000}.game{position:relative;overflow:hidden}.title{position:absolute;left:16px;top:12px;z-index:5;text-shadow:3px 3px 0 #000}.title b{font-size:28px;color:var(--gold)}.world{position:absolute;inset:0;display:grid;place-items:center}.rings{position:relative;width:min(76vmin,760px);height:min(76vmin,760px);border-radius:50%;background:repeating-radial-gradient(circle,#1d3524 0 54px,#24462d 54px 108px,#182c20 108px 162px);border:4px solid #071008;box-shadow:inset 0 0 80px #0008}.ring{position:absolute;border:2px dashed #ffffff22;border-radius:50%;inset:10%}.r2{inset:24%}.r3{inset:38%}.tree{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:92px;height:110px;text-align:center;font-size:64px;filter:drop-shadow(0 0 18px #7cff8a)}.player{position:absolute;width:28px;height:28px;border-radius:50% 50% 42% 42%;background:var(--green);border:3px solid #071008;box-shadow:0 0 15px #7cff8a;transform:translate(-50%,-50%);transition:.12s linear}.poi{position:absolute;transform:translate(-50%,-50%);font-size:28px;text-shadow:3px 3px #000;cursor:pointer}.poi:hover{scale:1.18}.chat{display:flex;flex-direction:column;min-width:0}.chat h2{margin:12px 12px 6px;color:var(--gold);font-size:18px}.log{flex:1;margin:0 10px 10px;padding:10px;background:#0b130e;border:2px solid var(--line);overflow:auto;font-size:13px;line-height:1.45}.msg{margin-bottom:8px}.me{color:var(--green)}.sera{color:var(--gold)}.input{display:flex;gap:6px;padding:0 10px 10px}.input input{flex:1;background:#0b130e;color:var(--text);border:2px solid var(--line);padding:10px;font:inherit}.input button,.btn{background:#2e5735;color:var(--text);border:2px solid #050805;padding:10px 12px;font:inherit;font-weight:900;cursor:pointer;box-shadow:3px 3px #000}.input button:hover,.btn:hover{transform:translate(1px,1px);box-shadow:1px 1px #000}.hud{grid-column:1/3;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px}.stat{display:flex;gap:16px;flex-wrap:wrap}.stat b{color:var(--gold)}.mobile{display:none}@media(max-width:860px){body{overflow:auto}.app{height:auto;min-height:100vh;grid-template-columns:1fr;grid-template-rows:70vh 360px 74px}.hud{grid-column:1}.mobile{display:inline}.rings{width:92vmin;height:92vmin}}
</style>
</head>
<body>
<div class="app">
  <main class="game" id="game">
    <div class="title"><b>WORLDTREE</b><br><span id="subtitle">Expedition v0.1</span></div>
    <div class="world">
      <div class="rings" id="rings">
        <div class="ring"></div><div class="ring r2"></div><div class="ring r3"></div>
        <div class="tree">🌳</div>
        <div class="player" id="player"></div>
      </div>
    </div>
  </main>
  <aside class="chat">
    <h2>세라 채팅방</h2>
    <div class="log" id="log"></div>
    <div class="input"><input id="chatInput" placeholder="세라에게 말하기" maxlength="120"><button id="send">전송</button></div>
  </aside>
  <footer class="hud">
    <div class="stat">
      <span>행동력 <b id="ap">50</b></span><span>Wood <b id="wood">0</b></span><span>Gold <b id="gold">0</b></span><span>전투력 <b id="power">10</b></span><span>환생P <b id="rp">0</b></span><span>최고거리 <b id="best">0m</b></span>
    </div>
    <button class="btn" id="rebirth">귀환/환생</button>
  </footer>
</div>
<script>
const $=id=>document.getElementById(id);let s=JSON.parse(localStorage.wt||'null')||{ap:50,wood:0,gold:0,power:10,rp:0,x:0,y:0,best:0,run:0};
const pois=[['🌲',-30,-20,'나무'],['🕳️',22,-34,'동굴'],['👹',36,12,'몬스터'],['📦',-42,28,'상자'],['⛰️',8,46,'폐허'],['❄️',-8,-52,'설원']];
function save(){localStorage.wt=JSON.stringify(s)}function ui(){['ap','wood','gold','power','rp'].forEach(k=>$(k).textContent=s[k]);$('best').textContent=s.best+'m';$('player').style.left=(50+s.x)+'%';$('player').style.top=(50+s.y)+'%';save()}
function log(w,t){$('log').innerHTML+=`<div class="msg ${w}"><b>${w==='me'?'나':'세라'}:</b> ${t}</div>`;$('log').scrollTop=99999}
function moveTo(x,y,name){if(s.ap<=0){log('sera','행동력이 없습니다. 귀환하세요.');return}let dx=x-s.x,dy=y-s.y,cost=Math.max(1,Math.ceil(Math.hypot(dx,dy)/8));if(cost>s.ap){log('sera','행동력이 부족합니다.');return}s.ap-=cost;s.x=x;s.y=y;let d=Math.round(Math.hypot(x,y));s.best=Math.max(s.best,d);eventAt(name,d);ui()}
function eventAt(name,d){if(name==='나무'){let w=3+Math.floor(d/10);s.wood+=w;log('sera',`벌목 성공. Wood +${w}`)}else if(name==='동굴'){Math.random()<.45?(s.gold+=20,log('sera','동굴에서 Gold +20')):log('sera','빈 동굴입니다.')}else if(name==='몬스터'){let need=10+d; if(s.power>=need){s.gold+=15;s.power+=1;log('sera','충돌 승리. Gold +15, 전투력 +1')}else{log('sera','전투력 부족. 귀환 추천.')}}else if(name==='상자'){Math.random()<.35?(s.rp+=1,log('sera','희귀 상자! 환생P +1')):log('sera','상자는 비어 있습니다.')}else{log('sera',name+' 탐험 완료.')}}
function rebirth(){let gain=Math.floor(s.best/10)+Math.floor(s.wood/25)+Math.floor(s.gold/50);s.rp+=gain;s.ap=50+Math.floor(s.rp/3);s.power=10+Math.floor(s.rp/2);s.wood=0;s.gold=0;s.x=0;s.y=0;s.best=0;s.run++;log('sera',`귀환 완료. 환생P +${gain}. 다음 행동력 ${s.ap}`);ui()}
pois.forEach(p=>{let e=document.createElement('div');e.className='poi';e.textContent=p[0];e.style.left=(50+p[1])+'%';e.style.top=(50+p[2])+'%';e.title=p[3];e.onclick=()=>moveTo(p[1],p[2],p[3]);$('rings').appendChild(e)});
$('rebirth').onclick=rebirth;$('send').onclick=()=>{let v=$('chatInput').value.trim();if(!v)return;log('me',v);$('chatInput').value='';setTimeout(()=>log('sera','기록했습니다. 지금은 로컬 세라 채팅 MVP입니다.'),180)};$('chatInput').onkeydown=e=>{if(e.key==='Enter')$('send').click()};
log('sera','WorldTree v0.1 시작. 세계수 주변 아이콘을 클릭해 원정하세요.');ui();
</script>
</body>
</html>
