<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WorldTree MVP</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#07100c;color:#fff5d2;font-family:monospace}.app{min-height:100vh;display:grid;grid-template-columns:1fr 340px;grid-template-rows:1fr auto;gap:10px;padding:10px}.box{background:#111f17;border:3px solid #030603;box-shadow:5px 5px #000}.world{position:relative;min-height:560px;overflow:hidden;background:radial-gradient(ellipse at center,#2e6335 0 12%,#1e3f29 13% 36%,#27351f 37% 62%,#17242a 63% 100%);border-radius:50% 50% 42% 42%}.world:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent 48%,#ffffff16 49% 51%,transparent 52%),linear-gradient(0deg,transparent 48%,#ffffff16 49% 51%,transparent 52%);background-size:42px 42px}.tree{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:80px;filter:drop-shadow(0 0 20px #75ff90)}.piece{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:26px;height:32px;border:3px solid #061006;border-radius:50% 50% 34% 34%;background:#75ff90;box-shadow:0 0 18px #75ff90;transition:.18s}.poi{position:absolute;transform:translate(-50%,-50%);font-size:30px;cursor:pointer;text-shadow:3px 3px #000}.fire{filter:drop-shadow(0 0 15px #ffb23b)}.side{padding:12px;display:flex;flex-direction:column;gap:10px}.log{height:330px;overflow:auto;background:#08100b;border:2px solid #4d6b46;padding:10px;line-height:1.5}.hud{grid-column:1/3;display:grid;grid-template-columns:150px 1fr 330px;gap:10px;padding:10px;align-items:center}.portrait{display:grid;grid-template-columns:56px 1fr;gap:8px;align-items:center;background:#08100b;border:2px solid #4d6b46;padding:8px}.face{font-size:46px}.stats{display:flex;gap:12px;flex-wrap:wrap}.stats b{color:#ffd76a}.shop{display:grid;grid-template-columns:1fr 1fr;gap:6px}button,a{background:#2e5735;color:#fff5d2;border:2px solid #030603;box-shadow:3px 3px #000;padding:10px;font:inherit;font-weight:900;text-decoration:none;cursor:pointer}.gold{background:#ffd76a;color:#241909}@media(max-width:840px){.app{grid-template-columns:1fr}.hud{grid-column:1;grid-template-columns:1fr}.world{min-height:440px}.shop{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<main class="box world" id="world"><a href="index.html" style="position:absolute;right:12px;top:12px;z-index:5">Portal</a><div class="tree">🌳</div><div class="piece" id="piece"></div></main>
<aside class="box side"><h2>세계수 로비</h2><p>탐험은 작은 말로, 성장은 HUD 캐릭터로 체감합니다.</p><div class="log" id="log"></div><button id="reset">저장 초기화</button></aside>
<footer class="box hud"><div class="portrait"><div class="face" id="face">🧝</div><div><b id="title">새싹 모험가</b><br><span id="gear">나무검 · 천 갑옷</span></div></div><div class="stats"><span>행동력 <b id="ap">50</b>/<b id="maxAp">50</b></span><span>Wood <b id="wood">0</b></span><span>Gold <b id="gold">0</b></span><span>파워 <b id="power">10</b></span><span>환생P <b id="rp">0</b></span><span>최고거리 <b id="best">0</b>m</span></div><div class="shop"><button class="gold" id="return">귀환/환생</button><button id="upAp">행동력 강화</button><button id="upPower">파워 강화</button><button id="newRun">새 원정</button></div></footer>
</div>
<script>
const $=id=>document.getElementById(id);let s=JSON.parse(localStorage.wtSimpleMvp||'null')||{ap:50,maxAp:50,wood:0,gold:0,power:10,rp:0,x:0,y:0,best:0,apLv:0,powerLv:0};const pois=[['🌲','숲',24,28],['🕳️','동굴',70,24],['🔥','불빛',82,55],['📦','상자',32,72],['💎','광맥',18,62],['🛖','마을',68,72]];function save(){localStorage.wtSimpleMvp=JSON.stringify(s)}function log(t){$('log').innerHTML+='<div>· '+t+'</div>';$('log').scrollTop=9999}function ui(){['ap','maxAp','wood','gold','power','rp','best'].forEach(k=>$(k).textContent=s[k]);$('piece').style.left=s.x+'%';$('piece').style.top=s.y+'%';let tier=s.rp>=25?3:s.rp>=8?2:1;$('piece').style.background=tier===3?'#8ccfff':tier===2?'#ffd76a':'#75ff90';$('face').textContent=tier===3?'🧙':'🧝';$('title').textContent=tier===3?'세계수 기사':tier===2?'숙련 모험가':'새싹 모험가';$('gear').textContent=tier===3?'빛의 검 · 잎망토':tier===2?'강철검 · 가죽 갑옷':'나무검 · 천 갑옷';save()}function reward(name,d){if(name==='숲'){let v=5+Math.floor(d/20);s.wood+=v;log('숲 채집 Wood +'+v)}else if(name==='동굴'){Math.random()<.5?(s.gold+=30,log('동굴 보상 Gold +30')):log('빈 동굴')}else if(name==='불빛'){s.power>=d?(s.gold+=40,log('불빛 지역 통과 Gold +40')):log('파워가 낮아 다음에 도전')}else if(name==='상자'){Math.random()<.4?(s.rp+=2,log('희귀 상자 환생P +2')):(s.gold+=10,log('상자 Gold +10'))}else if(name==='광맥'){s.wood+=5;s.gold+=15;log('광맥 Wood +5 Gold +15')}else if(name==='마을'){s.ap=Math.min(s.maxAp,s.ap+10);log('마을 휴식 행동력 +10')}}function move(x,y,name){let dist=Math.round(Math.hypot(x-50,y-50));let cost=Math.max(1,Math.ceil(Math.hypot(x-s.x,y-s.y)/9));if(s.ap<cost){log('행동력 부족');return}s.ap-=cost;s.x=x;s.y=y;s.best=Math.max(s.best,dist);reward(name,dist);ui()}function make(){pois.forEach(p=>{let e=document.createElement('div');e.className='poi '+(p[0]==='🔥'?'fire':'');e.textContent=p[0];e.title=p[1];e.style.left=p[2]+'%';e.style.top=p[3]+'%';e.onclick=()=>move(p[2],p[3],p[1]);$('world').appendChild(e)})}function rebirth(){let gain=Math.floor(s.best/12)+Math.floor(s.wood/25)+Math.floor(s.gold/50);s.rp+=gain;log('귀환 완료 환생P +'+gain);s.ap=s.maxAp;s.wood=0;s.gold=0;s.x=50;s.y=50;s.best=0;ui()}function up(kind){let cost=kind==='ap'?5+s.apLv*3:5+s.powerLv*3;if(s.rp<cost){log('환생P 부족 필요 '+cost);return}s.rp-=cost;if(kind==='ap'){s.apLv++;s.maxAp+=10;s.ap=s.maxAp;log('행동력 강화 완료')}else{s.powerLv++;s.power+=6;log('파워 강화 완료')}ui()}$('return').onclick=rebirth;$('upAp').onclick=()=>up('ap');$('upPower').onclick=()=>up('power');$('newRun').onclick=()=>{s.ap=s.maxAp;s.x=50;s.y=50;s.best=0;log('새 원정 시작');ui()};$('reset').onclick=()=>{localStorage.removeItem('wtSimpleMvp');location.reload()};make();if(!s.x){s.x=50;s.y=50}log('MVP 시작. 행동력으로 탐험하고 HUD 캐릭터를 성장시키세요.');ui();
</script>
</body>
</html>
